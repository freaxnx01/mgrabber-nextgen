name: .NET Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with Coverage
        run: |
          dotnet test --no-build --verbosity normal \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=./coverage/

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5.4.3
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'HtmlInline;Cobertura;MarkdownSummaryGithub'

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport
          retention-days: 30

      - name: Add Coverage PR Comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: coveragereport/SummaryGithub.md

      - name: Check Coverage Threshold
        run: |
          COVERAGE=$(cat coveragereport/SummaryGithub.md | grep -oP '(?<=Coverage: )[0-9]+' || echo "0")
          echo "Code coverage: $COVERAGE%"
          if [ "$COVERAGE" -lt "60" ]; then
            echo "::warning::Code coverage ($COVERAGE%) is below threshold (60%)"
          fi

      - name: Publish Host
        run: |
          dotnet publish src/Host/Host.csproj \
            -c Release \
            -o ./publish/host \
            --no-restore \
            --self-contained false

      - name: Create release archives
        run: |
          tar -czf host-release-${{ github.sha }}.tar.gz -C publish host/
          zip -r host-release-${{ github.sha }}.zip publish/host/

      - name: Upload Host artifact (tar.gz)
        uses: actions/upload-artifact@v4
        with:
          name: host-release-tar
          path: host-release-${{ github.sha }}.tar.gz
          retention-days: 30

      - name: Upload Host artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: host-release-zip
          path: host-release-${{ github.sha }}.zip
          retention-days: 30

      - name: Create release notes
        run: |
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Host" >> $GITHUB_STEP_SUMMARY
          echo "- Tarball: \`host-release-${{ github.sha }}.tar.gz\`" >> $GITHUB_STEP_SUMMARY
          echo "- ZIP: \`host-release-${{ github.sha }}.zip\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
          cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
