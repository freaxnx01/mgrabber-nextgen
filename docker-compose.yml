services:
  musicgrabber:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musicgrabber
    expose:
      - "8080"
    volumes:
      - data:/data
      - storage:/storage
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=${ConnectionStrings__Default:-Data Source=/data/musicgrabber.db}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - AUTHENTIK_AUTHORITY=${AUTHENTIK_AUTHORITY:-https://auth.home.freaxnx01.ch/application/o/musicgrabber/}
      - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID:-}
      - AUTHENTIK_CLIENT_SECRET=${AUTHENTIK_CLIENT_SECRET:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - Serilog__MinimumLevel=${Serilog__MinimumLevel:-Information}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  data:
    driver: local
  storage:
    driver: local
