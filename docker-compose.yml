version: '3.8'

services:
  frontend:
    build:
      context: ./src/Frontend
      dockerfile: Dockerfile
    container_name: mgrabber-frontend
    ports:
      - "8086:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DownloadApi__BaseUrl=http://download-api:8080
      - DownloadApi__ApiKey=${API_KEY:-default-dev-key-change-in-production}
      - DevAuth__Email=${DEV_EMAIL:-dev@test.local}
      - DevAuth__Name=${DEV_NAME:-Dev User}
      - DevAuth__Role=${DEV_ROLE:-User}
    networks:
      - internal
    depends_on:
      - download-api

  download-api:
    build:
      context: ./src/DownloadApi
      dockerfile: Dockerfile
    container_name: mgrabber-download-api
    # Port mapping for development (internal only in production)
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - API_KEY=${API_KEY:-default-dev-key-change-in-production}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    volumes:
      - storage:/storage
      - data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  internal:
    driver: bridge

volumes:
  storage:
    driver: local
  data:
    driver: local
