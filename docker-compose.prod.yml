version: '3.8'

# Production Docker Compose with Traefik
# Use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  frontend:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - internal
      - traefik  # Add Traefik network for production
    labels:
      # Traefik labels for routing
      - "traefik.enable=true"
      - "traefik.http.routers.mgrabber.rule=Host(`mgrabber.home.freaxnx01.ch`)"
      - "traefik.http.routers.mgrabber.entrypoints=websecure"
      - "traefik.http.routers.mgrabber.tls=true"
      - "traefik.http.routers.mgrabber.tls.certresolver=letsencrypt"
      - "traefik.http.services.mgrabber.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik"
      # Redirect HTTP to HTTPS
      - "traefik.http.routers.mgrabber-http.rule=Host(`mgrabber.home.freaxnx01.ch`)"
      - "traefik.http.routers.mgrabber-http.entrypoints=web"
      - "traefik.http.routers.mgrabber-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
    # Remove direct port mapping in production (use Traefik)
    ports: []

networks:
  traefik:
    external: true  # Use existing Traefik network
